<!DOCTYPE html>
<!-- Объявление типа документа - указывает, что это HTML5 документ -->
<html lang = "ru">
<!-- Открывающий тег html с атрибутом lang="ru" для указания языка содержимого (русский) -->
    <head>
        <!-- Служебная информация о странице (не отображается на самой странице) -->
        <meta charset = "UTF-8" />
        <!-- Указывает кодировку символов - UTF-8 (поддерживает все символы, включая русские) -->
        <meta name = "viewport" content = "wigth=device-width, initial-scale=1.0" />
        <!-- Настройка отображения на мобильных устройствах -->
        <!-- ОШИБКА: в слове "wigth" опечатка, должно быть "width" -->
        <title> JSON и DOM </title>
        <!-- Заголовок страницы, отображается во вкладке браузера -->
        
        <style>
            /* CSS стили для оформления страницы */
            body {
                font-family: Arial, sans-serif;  /* Шрифт Arial или любой без засечек */
                padding: 20px;                    /* Внутренние отступы со всех сторон */
                max-width: 1000px;                 /* Максимальная ширина контента */
                margin: auto;                       /* Автоматические отступы по бокам для центрирования */
            }
            table {
                width: 100%;                        /* Таблица на всю ширину родителя */
                border-collapse: collapse;          /* Убирает двойные границы между ячейками */
                margin-top: 10px;                   /* Отступ сверху */
            }
            th, td {
                border: 1px solid #ccc;            /* Серая рамка толщиной 1px */
                padding: 6px;                        /* Внутренние отступы в ячейках */
                text-align: left;                    /* Текст прижат к левому краю */
            }
            th {
                background: #f3f3f3;                /* Светло-серый фон для заголовков таблицы */
            }
            button {
                cursor: pointer;                     /* При наведении курсор меняется на указатель */
            }
            .controls {
                margin-bottom: 10px;                 /* Отступ снизу */
                display: flex;                        /* Используем flexbox для расположения элементов */
                gap: 10px;                            /* Расстояние между элементами */
                flex-wrap: wrap;                       /* Перенос элементов на новую строку если не помещаются */
            }
            form {
                margin-top: 20px;                     /* Отступ сверху */
                display: grid;                         /* Используем CSS Grid для формы */
                grid-template-columns: repeat(2, 1fr); /* Две колонки равной ширины */
                gap: 10px;                             /* Расстояние между элементами формы */
            }
            form button {
                grid-column: span 2;                   /* Кнопка занимает обе колонки */
            }
        </style>
    </head>
    <body>
        <!-- Тело документа - всё, что видит пользователь -->
        <h1> JSON и DOM</h1>
        <!-- Заголовок первого уровня -->

        <div class="controls">
            <!-- Контейнер с классом controls для кнопок управления -->
            <button id="reload">Загрузить JSON</button>
            <!-- Кнопка с id="reload" для загрузки данных -->
            <button id="export">Скачать JSON</button>
            <!-- Кнопка с id="export" для скачивания JSON файла -->
            <input id="search" placeholder="Поиск по названию или автору"/>
            <!-- Поле ввода для поиска с id="search" и подсказкой внутри -->
            <span>Всего книг: <strong id="count">0</strong></span>
            <!-- Счетчик книг, внутри жирный текст с id="count" и начальным значением 0 -->
        </div>

        <table>
            <!-- Таблица для отображения книг -->
            <thead>
                <!-- Заголовочная часть таблицы -->
                <tr>
                    <!-- Строка с заголовками колонок -->
                    <th>Название</th>
                    <th>Автор</th>
                    <th>Жанр</th>
                    <th>Год</th>
                    <th>Рейтинг</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Тело таблицы с id="table-body" - сюда JavaScript будет добавлять строки с книгами -->
            </tbody>
        </table>
        
        <h2>Добавить/редактировать книгу</h2>
        <!-- Подзаголовок для формы -->
        
        <form id="book-form">
            <!-- Форма с id="book-form" для добавления/редактирования книг -->
            <input type="hidden" name="id"/>
            <!-- Скрытое поле для хранения id книги (невидимо для пользователя) -->
            <input name="title" placeholder="Название" required />
            <!-- Поле для названия книги, обязательное для заполнения (required) -->
            <input name="author" placeholder="Автор" required/>
            <!-- Поле для автора, обязательное для заполнения (required) -->
            <input name="genre" placeholder="Жанр" />
            <!-- Поле для жанра, необязательное -->
            <input name="year" type="number" placeholder="Год" />
            <!-- Поле для года, тип number - можно вводить только числа -->
            <input name="rating" type="number" step="0.1" placeholder="Рейтинг" />
            <!-- Поле для рейтинга, числа с шагом 0.1 (можно дробные) -->
            <button type="submit">Сохранить</button>
            <!-- Кнопка отправки формы, тип submit -->
        </form>
    </body>
</html>
<!-- Закрывающий тег html -->
